<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Content Security Policy enforced INSIDE the app too (the native iOS webview
       gets no Vercel response headers, so without this it would run with no CSP).
       Mirrors vercel.json and additionally allows the AI proxy origin that the
       native app must reach cross-origin. Scripts are 'self' only — no inline JS. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; form-action 'self'; script-src 'self' https://accounts.google.com https://*.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://*.gstatic.com https://*.googleusercontent.com; media-src 'self' blob: data:; connect-src 'self' https://anchor-lac.vercel.app https://api.cerebras.ai https://accounts.google.com https://*.googleapis.com; frame-src https://accounts.google.com; worker-src 'self' blob:; manifest-src 'self'" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#05060f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="Anchor — a mental-wellness companion that connects your sleep to your wellbeing and reflects you back to yourself." />
  <title>Anchor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="css/glass.css" />
  <link rel="stylesheet" href="css/anchor.css" />
  <link rel="stylesheet" href="css/weather.css" />
  <link rel="stylesheet" href="css/extras.css" />
  <link rel="stylesheet" href="css/refresh.css" />
  <link rel="stylesheet" href="css/liquid.css" />
</head>
<body class="theme-aurora">
  <!-- branded loading screen — the actual Anchor logo on the app's dark base,
       matching the iOS splash. Fades out the moment the app paints (app.js),
       with a hard CSS fallback so it can never linger. -->
  <div id="app-loader" aria-hidden="true">
    <img src="assets/logo.png" alt="Anchor" class="app-loader-logo" width="112" height="112" />
    <div class="app-loader-name">Anchor</div>
  </div>
  <style>
    #app-loader { position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px; background: #05060f;
      animation: appLoaderHold 4.5s forwards; }
    #app-loader.app-loader-out { opacity: 0; pointer-events: none; transition: opacity .5s ease; }
    .app-loader-logo { width: 112px; height: 112px; border-radius: 26px;
      box-shadow: 0 18px 50px -16px rgba(255,150,120,0.5); animation: appLoaderPulse 2s ease-in-out infinite; }
    .app-loader-name { font-family: 'Fraunces', Georgia, serif; font-size: 1.5rem; font-weight: 600;
      letter-spacing: -0.01em; color: #f3f5ff; opacity: 0.92; }
    @keyframes appLoaderPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    /* fallback: if JS never removes it, fade it out on its own after 4.5s */
    @keyframes appLoaderHold { 0%,88% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
    @media (prefers-reduced-motion: reduce) { .app-loader-logo { animation: none; } }
  </style>

  <!-- animated ambient background — the "place" the app lives in -->
  <div id="ambient" class="ambient" aria-hidden="true">
    <div class="ambient-orb orb-a"></div>
    <div class="ambient-orb orb-b"></div>
    <div class="ambient-orb orb-c"></div>
    <div class="ambient-art"></div>
    <div class="ambient-doodles"></div>
    <!-- opt-in: today's inner weather, drifting across the whole app -->
    <div id="wxbg" class="wxbg" aria-hidden="true"></div>
    <div class="ambient-grain"></div>
  </div>

  <div id="app" class="app">
    <header class="topbar glass" id="topbar">
      <button class="icon-btn" id="navBack" hidden aria-label="Back">‹</button>
      <div class="brand" id="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-name">Anchor</span>
      </div>
      <div class="nav-crumb" id="navCrumb" aria-hidden="true"></div>
      <div class="topbar-actions">
        <button class="icon-btn lifeline-btn" id="lifelineBtn" aria-label="Support">♥</button>
        <button class="icon-btn" id="settingsBtn" aria-label="Settings">⋯</button>
      </div>
    </header>

    <div id="banner" class="banner hidden" role="status"></div>

    <main id="view" class="view" aria-live="polite"></main>

    <nav class="navdock" id="tabbar" aria-label="Primary"></nav>
  </div>

  <div id="toast-host" class="toast-host" aria-live="assertive"></div>
  <div id="modal-host" class="modal-host"></div>
  <div id="sheet-host" class="sheet-host"></div>
  <div id="navmenu-host" class="navmenu-host"></div>
  <div id="coach-host" class="coach-host"></div>

  <!-- ===== load order matters ===== -->
  <!-- integration config (non-secret ids) -->
  <script src="js/config.js"></script>

  <!-- i18n engine + 20 languages -->
  <script src="js/i18n.js"></script>
  <script src="js/lang/en.js"></script>
  <script src="js/lang/es.js"></script>
  <script src="js/lang/fr.js"></script>
  <script src="js/lang/de.js"></script>
  <script src="js/lang/pt.js"></script>
  <script src="js/lang/it.js"></script>
  <script src="js/lang/nl.js"></script>
  <script src="js/lang/sv.js"></script>
  <script src="js/lang/pl.js"></script>
  <script src="js/lang/uk.js"></script>
  <script src="js/lang/ru.js"></script>
  <script src="js/lang/tr.js"></script>
  <script src="js/lang/ar.js"></script>
  <script src="js/lang/hi.js"></script>
  <script src="js/lang/zh.js"></script>
  <script src="js/lang/ja.js"></script>
  <script src="js/lang/ko.js"></script>
  <script src="js/lang/id.js"></script>
  <script src="js/lang/vi.js"></script>
  <script src="js/lang/th.js"></script>

  <!-- core services -->
  <script src="js/store.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/sleepscore.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/gamify.js"></script>
  <script src="js/native.js"></script>
  <script src="js/speech.js"></script>
  <script src="js/llm.js"></script>
  <script src="js/crisis.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/night.js"></script>
  <script src="js/weather.js"></script>
  <script src="js/registry.js"></script>

  <!-- feature modules (each self-registers a view) -->
  <script src="js/features/dashboard.js"></script>
  <script src="js/features/sleep.js"></script>
  <script src="js/features/patternDetective.js"></script>
  <script src="js/features/weatherMap.js"></script>
  <script src="js/features/experiments.js"></script>
  <script src="js/features/decompression.js"></script>
  <script src="js/features/valuesCompass.js"></script>
  <script src="js/features/mirror.js"></script>
  <script src="js/features/energyBudget.js"></script>
  <script src="js/features/journal.js"></script>
  <script src="js/features/checkin.js"></script>
  <script src="js/features/talk.js"></script>
  <script src="js/features/hub.js"></script>
  <script src="js/features/guide.js"></script>
  <script src="js/features/review.js"></script>
  <script src="js/features/toolkit.js"></script>
  <script src="js/features/timeline.js"></script>
  <script src="js/features/sounds.js"></script>
  <script src="js/features/progress.js"></script>
  <script src="js/features/settings.js"></script>
  <!-- merges related features (Journey = progress+timeline+review, Calm = winddown+grounding+sounds) -->
  <script src="js/features/combined.js"></script>

  <!-- onboarding + boot -->
  <script src="js/intro.js"></script>
  <script src="js/onboarding.js"></script>
  <script src="js/app.js"></script>
  <!-- "Living Glass" reactive chrome + specular (loads after boot) -->
  <script src="js/liquid.js"></script>
</body>
</html>
